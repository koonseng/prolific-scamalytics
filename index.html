// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// Build a lookup from real ID -> synthetic sentence
const synthByReal = {};
SYNTHETIC_SENTENCES.forEach(s => { synthByReal[s.matched_to] = s; });

// ============================================================
// TRIAL SELECTION
// ============================================================
function buildTrials() {
  const phases = ['opening', 'rapport', 'love_bombing', 'crisis', 'trust_building'];
  const trials = [];

  // For each phase, pick 3 random real sentences (and their matched synthetic)
  phases.forEach(phase => {
    const realForPhase = shuffle(REAL_SENTENCES.filter(r => r.phase === phase));
    const picked = realForPhase.slice(0, 3);
    picked.forEach(real => {
      const synth = synthByReal[real.id];
      if (!synth) return;
      const realIsA = Math.random() < 0.5;
      trials.push({
        type: 'pair',
        pairId: real.id + '-' + synth.id,
        phase: phase,
        realId: real.id,
        synthId: synth.id,
        realText: real.text,
        synthText: synth.text,
        sentenceA: realIsA ? real.text : synth.text,
        sentenceB: realIsA ? synth.text : real.text,
        realPosition: realIsA ? 'A' : 'B',
        isCatch: false
      });
    });
  });

  // Build 2 catch trial pairs: pair a real scam sentence with an obvious non-scam
  const usedRealIds = new Set(trials.map(t => t.realId));
  const availableReal = shuffle(REAL_SENTENCES.filter(r => !usedRealIds.has(r.id)));
  const nonScamCatches = shuffle(CATCH_TRIALS.filter(c => c.type === 'obvious_non_scam'));

  for (let i = 0; i < 2 && i < nonScamCatches.length && i < availableReal.length; i++) {
    const real = availableReal[i];
    const catchSentence = nonScamCatches[i];
    const realIsA = Math.random() < 0.5;
    trials.push({
      type: 'catch',
      pairId: real.id + '-' + catchSentence.id,
      phase: real.phase,
      realId: real.id,
      catchId: catchSentence.id,
      realText: real.text,
      catchText: catchSentence.text,
      sentenceA: realIsA ? real.text : catchSentence.text,
      sentenceB: realIsA ? catchSentence.text : real.text,
      realPosition: realIsA ? 'A' : 'B',
      isCatch: true,
      catchCategory: catchSentence.category
    });
  }

  return shuffle(trials);
}

function initStudy() {
  state.trials = buildTrials();
}

function buildPayload() {
  var endTime = Date.now();
  var durationSec = Math.round((endTime - state.startTime) / 1000);
  var trials = state.responses.trials;

  // Quality flags
  var catchTrials = trials.filter(function(t) { return t.is_catch; });
  var catchWrong = catchTrials.filter(function(t) { return !t.is_cant_tell && !t.correct; }).length;

  var nonCatch = trials.filter(function(t) { return !t.is_catch; });
  var aCount = nonCatch.filter(function(t) { return t.response === 'A'; }).length;
  var bCount = nonCatch.filter(function(t) { return t.response === 'B'; }).length;
  var ctCount = nonCatch.filter(function(t) { return t.response === 'cant_tell'; }).length;
  var total = nonCatch.length;
  var monotonic = total > 0 && (
    aCount / total > 0.85 || bCount / total > 0.85 || ctCount / total > 0.85
  );

  return {
    prolific_id: state.prolificPid,
    study_id: state.studyId,
    session_id: state.sessionId,
    start_time: new Date(state.startTime).toISOString(),
    end_time: new Date(endTime).toISOString(),
    duration_seconds: durationSec,
    scam_experience: state.responses.screening,
    flags: {
      catch_trial_failures: catchWrong,
      flag_catch: catchWrong >= 1,
      flag_speed: durationSec < 180,
      flag_monotonic: monotonic,
      excluded: (catchWrong >= 1) || (durationSec < 180) || monotonic
    },
    trials: state.responses.trials,
    questionnaire: state.responses.questionnaire
  };
}

function submitData() {
  var payload = buildPayload();

  // LocalStorage backup
  try {
    var existing = JSON.parse(localStorage.getItem('scam_validation_responses') || '[]');
    existing.push(payload);
    localStorage.setItem('scam_validation_responses', JSON.stringify(existing));
  } catch (e) {}

  // POST to API if configured
  var API_URL = window.SCAM_VALIDATION_API_URL || '';
  if (API_URL) {
    fetch('https://script.google.com/macros/s/AKfycbycym9mf0lR5iRl_x7B1NdCDt9xG9R8CRFXGib3LeJB03nYTSlpMZasbYM37k5PRnBaGw/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(err) { console.error('Submit failed:', err); });
  }

  console.log('=== PARTICIPANT DATA ===');
  console.log(JSON.stringify(payload, null, 2));
}
